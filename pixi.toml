[workspace]
authors = ["MoSafi2 <mohamed.mabrouk@rwth-aachen.de>"]
channels = ["conda-forge", "bioconda", "https://conda.modular.com/max/"]
name = "hts_mojo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
generate-bindings = "bash scripts/generate_bindings.sh"
build-file = "bash scripts/build_mojo_file.sh"
test-raw = "bash -lc 'bash scripts/build_mojo_file.sh tests/test_raw.mojo build/raw-tests && LD_LIBRARY_PATH=build:$CONDA_PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH} ./build/raw-tests'"
test-engine = "bash -lc 'bash scripts/build_mojo_file.sh tests/test_engine.mojo build/engine-tests && LD_LIBRARY_PATH=build:$CONDA_PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH} ./build/engine-tests'"

[dependencies]
python = ">=3.14.6,<3.15"
mojo = ">=1.0.0b2,<2"
htslib = { version = ">=1.23.1,<2", channel = "bioconda" }

[pypi-dependencies]
mojo-bindgen = ">=0.3.4, <0.4"
